{% extends 'base.html' %}

{% block title %}Supprimer la Tâche - ESMT Task{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm mt-5">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="fas fa-trash-alt text-danger fa-4x opacity-50"></i>
                    </div>
                    <h3 class="fw-bold mb-3">Supprimer la Tâche</h3>
                    <p class="text-muted mb-4">
                        Êtes-vous sûr de vouloir supprimer la tâche <strong>"{{ object.title }}"</strong> du projet
                        <strong>"{{ object.project.name }}"</strong> ?
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger py-2 fw-bold">Oui, supprimer</button>
                            <a href="{% url 'project_detail' object.project.pk %}"
                                class="btn btn-light py-2">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
